<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CoinMonitor</title>
    <meta
      name="description"
      content="CoinMonitor 是一个专注观察列表与悬浮窗体验的 Android 币价监控应用。"
    />
    <meta name="theme-color" content="#1c1830" />
    <meta property="og:title" content="CoinMonitor" />
    <meta
      property="og:description"
      content="搜索币对、加入观察列表，并通过系统悬浮窗在任意 App 上方快速盯盘。"
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="./assets/screen-watch.webp" />
    <link rel="icon" type="image/svg+xml" href="./assets/coinmonitor_app_icon.svg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="hero">
      <div class="hero__content">
        <div class="brand-chip">
          <img
            class="brand-chip__icon"
            src="./assets/coinmonitor_app_icon.svg"
            alt="CoinMonitor 应用图标"
            width="28"
            height="28"
          />
          <span>Android · Open Source</span>
        </div>

        <div class="hero__copy">
          <p class="hero__eyebrow">观察列表 + 悬浮窗盯盘</p>
          <h1>CoinMonitor</h1>
          <p class="hero__lead">
            一个专注于币价追踪效率的 Android 盯盘应用。
            支持搜索交易对、维护观察列表，并在任意应用上方用悬浮窗快速查看实时价格。
          </p>
          <p class="hero__meta">Binance Alpha · Binance · OKX · Android 8.0+</p>
        </div>

        <div class="hero__actions">
          <a
            class="action-button action-button--ghost"
            href="https://github.com/baiyanwu/CoinMonitor"
            target="_blank"
            rel="noopener noreferrer"
          >
            <span class="action-button__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" role="img" aria-hidden="true">
                <path
                  fill="currentColor"
                  d="M12 2C6.48 2 2 6.59 2 12.24c0 4.52 2.87 8.35 6.84 9.71.5.1.68-.22.68-.49 0-.24-.01-1.04-.01-1.89-2.78.62-3.37-1.22-3.37-1.22-.46-1.2-1.11-1.52-1.11-1.52-.91-.64.07-.63.07-.63 1 .08 1.53 1.06 1.53 1.06.9 1.56 2.35 1.11 2.92.85.09-.67.35-1.11.63-1.37-2.22-.26-4.56-1.15-4.56-5.12 0-1.13.39-2.05 1.03-2.78-.1-.26-.45-1.31.1-2.74 0 0 .84-.28 2.75 1.06A9.3 9.3 0 0 1 12 6.84c.85 0 1.71.12 2.51.35 1.91-1.34 2.75-1.06 2.75-1.06.55 1.43.2 2.48.1 2.74.64.73 1.03 1.65 1.03 2.78 0 3.98-2.34 4.85-4.57 5.11.36.32.68.95.68 1.92 0 1.39-.01 2.51-.01 2.85 0 .27.18.59.69.49A10.26 10.26 0 0 0 22 12.24C22 6.59 17.52 2 12 2Z"
                />
              </svg>
            </span>
            <span>GitHub</span>
          </a>
          <a
            class="action-button action-button--primary"
            href="https://github.com/baiyanwu/CoinMonitor/releases/latest"
            target="_blank"
            rel="noopener noreferrer"
          >
            <span class="action-button__icon action-button__icon--image" aria-hidden="true">
              <img
                src="./assets/coinmonitor_app_icon.svg"
                alt=""
                width="22"
                height="22"
              />
            </span>
            <span>下载</span>
          </a>
        </div>

        <ul class="hero__points" aria-label="核心特性">
          <li>快速搜索现货交易对</li>
          <li>观察列表集中管理</li>
          <li>系统悬浮窗跨应用盯盘</li>
          <li>实时刷新价格</li>
        </ul>
      </div>

      <div class="hero__visual" aria-label="CoinMonitor 应用截图展示">
        <figure class="shot-card shot-card--watch">
          <img src="./assets/screen-watch.webp" alt="观察列表页面截图" />
          <figcaption>Watch</figcaption>
        </figure>
        <figure class="shot-card shot-card--search">
          <img src="./assets/screen-search.webp" alt="搜索页面截图" />
          <figcaption>Search</figcaption>
        </figure>
        <figure class="shot-card shot-card--settings">
          <img src="./assets/screen-settings.webp" alt="设置页面截图" />
          <figcaption>Settings</figcaption>
        </figure>
        <figure class="shot-card shot-card--overlay">
          <img src="./assets/screen-overlay.webp" alt="悬浮窗设置页面截图" />
          <figcaption>Overlay</figcaption>
        </figure>
      </div>
    </main>
  </body>
</html>
