name: Android CI

on:
  push:
    branches:
      - dev
      - main
      - master
      - release/**
      - hotfix/**
    paths-ignore:
      - "README.md"
      - "README.zh-CN.md"
      - "TECHNICAL.md"
      - "LICENSE"
      - "CONTRIBUTING.md"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/pull_request_template.md"
      - "artwork/**"
  pull_request:
    paths-ignore:
      - "README.md"
      - "README.zh-CN.md"
      - "TECHNICAL.md"
      - "LICENSE"
      - "CONTRIBUTING.md"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/pull_request_template.md"
      - "artwork/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Grant execute permission for Gradle
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Run lint
        run: ./gradlew :app:lintDebug

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug
