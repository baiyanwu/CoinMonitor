name: Android CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Grant execute permission for Gradle
        run: chmod +x gradlew

      - name: Restore release keystore
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          mkdir -p keystore
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > keystore/coinmonitor-release.jks

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Run lint
        run: ./gradlew :app:lintDebug

      - name: Build debug and release APK
        env:
          ANDROID_RELEASE_STORE_FILE: ${{ github.workspace }}/keystore/coinmonitor-release.jks
          ANDROID_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: ./gradlew :app:assembleDebug :app:assembleRelease

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: coinmonitor-debug-apk-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: coinmonitor-release-apk-${{ github.sha }}
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload lint report artifact
        uses: actions/upload-artifact@v4
        with:
          name: coinmonitor-lint-report-${{ github.sha }}
          path: app/build/reports/lint-results-debug.html
          if-no-files-found: error
          retention-days: 14

      - name: Upload mapping files
        if: ${{ hashFiles('app/build/outputs/mapping/release/**') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: coinmonitor-release-mapping-${{ github.sha }}
          path: app/build/outputs/mapping/release/**
          if-no-files-found: ignore
          retention-days: 14
